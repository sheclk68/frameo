<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Hexagon behind F -->
  <polygon points="256,80 386,148 386,364 256,432 126,364 126,148" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- F letter -->
  <text x="256" y="310" text-anchor="middle" font-size="240" font-weight="800" font-family="system-ui, -apple-system, sans-serif" fill="white" letter-spacing="-10">F</text>
  <!-- Small accent dots -->
  <circle cx="386" cy="148" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="126" cy="364" r="6" fill="#5eead4" opacity="0.6"/>
</svg>
